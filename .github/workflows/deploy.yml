name: Deploy

on:
  push:
    branches: [main]

# DESIGN: Both jobs always start and self-skip via file-existence checks.
# No secrets or vars references in any if: condition — GitHub does not
# expose those contexts during workflow parsing, causing zero-job failures.

jobs:
  # ── Web → Vercel ────────────────────────────────────────────────────
  web-deploy:
    name: Web — build + deploy to Vercel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Check web/ exists
        id: web_exists
        working-directory: .
        run: |
          if [ -f web/package.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::notice::web/package.json not found — skipping web deploy"
          fi

      - uses: pnpm/action-setup@v3
        if: steps.web_exists.outputs.exists == 'true'
        with:
          version: 9

      - uses: actions/setup-node@v4
        if: steps.web_exists.outputs.exists == 'true'
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        if: steps.web_exists.outputs.exists == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build
        if: steps.web_exists.outputs.exists == 'true'
        run: pnpm build

      - name: Deploy to Vercel
        if: steps.web_exists.outputs.exists == 'true'
        run: |
          npm i -g vercel
          vercel --prod --token ${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── Mobile → EAS ────────────────────────────────────────────────────
  mobile-build:
    name: Mobile — EAS build (iOS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Check mobile/ exists
        id: mobile_exists
        working-directory: .
        run: |
          if [ -f mobile/package.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::notice::mobile/package.json not found — skipping EAS build"
          fi

      - uses: actions/setup-node@v4
        if: steps.mobile_exists.outputs.exists == 'true'
        with:
          node-version: 20

      - name: Install dependencies
        if: steps.mobile_exists.outputs.exists == 'true'
        run: npm install

      - name: Check EXPO_TOKEN set
        id: expo_token_check
        if: steps.mobile_exists.outputs.exists == 'true'
        run: |
          if [ -n "$EXPO_TOKEN" ]; then
            echo "has_token=true" >> $GITHUB_OUTPUT
          else
            echo "has_token=false" >> $GITHUB_OUTPUT
            echo "::notice::EXPO_TOKEN not set — skipping EAS build"
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - uses: expo/expo-github-action@v8
        if: |
          steps.mobile_exists.outputs.exists == 'true' &&
          steps.expo_token_check.outputs.has_token == 'true'
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Build
        if: |
          steps.mobile_exists.outputs.exists == 'true' &&
          steps.expo_token_check.outputs.has_token == 'true'
        run: eas build --platform ios --non-interactive --profile preview
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
